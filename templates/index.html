<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Portal</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/logo.png') }}">

    <style>
        :root {
            --bg-overlay: rgba(0, 0, 0, 0.55);
            --card: rgba(255, 255, 255, 0.95);
            --text: #0f172a;
            --muted: #64748b;
            --primary: #4f46e5;
            --secondary: #6366f1;
            --success: #10b981;
        }

        /* DARK MODE */
        body.dark {
            --bg-overlay: rgba(0, 0, 0, 0.65);
            --card: rgba(15, 23, 42, 0.9);
            --text: #e5e7eb;
            --muted: #9ca3af;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Poppins", sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(var(--bg-overlay), var(--bg-overlay)),
            url("{{ url_for('static', filename='images/gate.jpeg') }}");
            background-size: cover;
            background-position: center;
            transition: 0.4s;
            backdrop-filter: blur(4px);
        }

        .shell {
            max-width: 700px;
            width: 100%;
            padding: 20px;
        }

        .theme-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #fff;
            border: none;
            padding: 10px 14px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
        }

        body.dark .theme-btn {
            background: #111827;
            color: #fff;
        }

        .hero {
            background: var(--card);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            backdrop-filter: blur(12px);
        }

        .hero img {
            width: 90px;
            margin-bottom: 10px;
        }

        .hero h1 {
            margin: 0;
            font-size: 20px;
            color: var(--text);
        }

        .hero p {
            margin-top: 6px;
            color: var(--muted);
        }

        .hero-tag {
            margin-top: 10px;
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            background: var(--primary);
            color: #fff;
            font-size: 12px;
        }

        .card {
            margin-top: 20px;
            background: var(--card);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(12px);
        }

        .card h2 {
            text-align: center;
            margin-top: 0;
            color: var(--text);
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-top: 20px;
        }

        .btn {
            padding: 14px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            text-align: center;
            color: #fff;
        }

        .btn-hod {
            background: var(--primary);
        }

        .btn-class {
            background: var(--secondary);
        }

        .btn-principal {
            background: var(--success);
        }
    </style>
</head>

<body>

    <button onclick="toggleTheme()" class="theme-btn">🌙</button>

    <div class="shell">

        <section class="hero">
            <img src="{{ url_for('static', filename='images/logo.png') }}">
            <h1>P.T. LEE CHENGALVARAYA NAICKER<br>COLLEGE OF ENGINEERING & TECHNOLOGY</h1>
            <p>Attendance Management System</p>
            <div class="hero-tag">Smart Campus</div>
        </section>

        <section class="card">
            <h2>Select Login Role</h2>

            <div class="button-group">
                <a href="{{ url_for('login_hod_page') }}" class="btn btn-hod">Login as HOD</a>
                <a href="{{ url_for('login_classrep_page') }}" class="btn btn-class">Login as Class Rep</a>
                <a href="{{ url_for('login_principal_page') }}" class="btn btn-principal">Login as Principal</a>
            </div>

        </section>

    </div>

    <script>
        function toggleTheme() {
            document.body.classList.toggle("dark");
            localStorage.setItem("theme",
                document.body.classList.contains("dark") ? "dark" : "light");
        }

        window.onload = function () {
            if (localStorage.getItem("theme") === "dark") {
                document.body.classList.add("dark");
            }
        }
    </script>

</body>

</html>
