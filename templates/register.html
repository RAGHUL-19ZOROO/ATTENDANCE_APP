0<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>{{ title or 'Login' }} - Attendance Portal</title>

	<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;600;700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
	<link rel="icon" href="{{ url_for('static', filename='images/logo.png') }}">

<style>
:root{
	--ink:#e6edf6;
	--muted:#9fb0c1;
	--glass:rgba(255,255,255,0.06);
	--border:rgba(255,255,255,0.18);
	--accent:#22c55e;
	--accent2:#0ea5a5;
	--bg:linear-gradient(135deg,#0f172a,#0b1d3a,#0f3a4a);
}

*{box-sizing:border-box;}

body{
	font-family:"Rubik","Space Grotesk",sans-serif;
	margin:0;
	min-height:100vh;
	background:var(--bg);
	display:flex;
	align-items:center;
	justify-content:center;
	padding:30px 15px;
	color:var(--ink);
}

.shell{
	max-width:600px;
	width:100%;
}

.navbar{
	display:flex;
	justify-content:flex-end;
	margin-bottom:12px;
}

.nav-link{
	text-decoration:none;
	color:#fff;
	background:rgba(255,255,255,0.08);
	padding:8px 14px;
	border-radius:10px;
	font-weight:600;
	border:1px solid var(--border);
}

.hero{
	background:var(--glass);
	border-radius:24px;
	padding:30px;
	text-align:center;
	border:1px solid var(--border);
	backdrop-filter:blur(18px);
	margin-bottom:20px;
}

.hero img{
	width:80px;
	margin-bottom:10px;
}

.hero h1{
	margin:0;
	font-size:1.3rem;
	font-weight:700;
}

.hero p{
	margin-top:6px;
	color:var(--muted);
}

.hero-tag{
	margin-top:10px;
	display:inline-block;
	padding:8px 16px;
	border-radius:999px;
	background:linear-gradient(135deg,#22c55e,#0ea5a5);
	font-size:0.8rem;
	font-weight:600;
}

/* LOGIN CARD */
.card{
	background:var(--glass);
	border-radius:24px;
	padding:26px;
	border:1px solid var(--border);
	backdrop-filter:blur(18px);
}

.card h2{
	margin:0 0 20px;
	text-align:center;
	font-weight:700;
}

.form-group{
	display:flex;
	flex-direction:column;
	gap:6px;
	margin-bottom:16px;
}

.form-group label{
	font-size:0.9rem;
	color:var(--muted);
	font-weight:600;
}

.form-group input{
	padding:12px;
	border-radius:12px;
	border:1px solid var(--border);
	background:rgba(255,255,255,0.08);
	color:#fff;
}

.btn{
	padding:14px;
	border:none;
	border-radius:14px;
	background:linear-gradient(135deg,#22c55e,#0ea5a5);
	color:#fff;
	font-weight:600;
	cursor:pointer;
	width:100%;
}

.error{
	color:#f87171;
	font-size:0.9rem;
	margin-bottom:10px;
	text-align:center;
}

.back-link{
	text-align:center;
	margin-top:12px;
}

.back-link a{
	color:#22c55e;
	text-decoration:none;
	font-weight:600;
}
</style>
</head>

<body>

<div class="shell">

	<nav class="navbar">
		<a href="{{ url_for('auth.index') }}" class="nav-link">Home</a>
	</nav>

	<section class="hero">
		<!-- <img src="{{ url_for('static', filename='/images/logo.png') }}"> -->
		<h1>AGRICULTURE INSTITUTION</h1>
		<p>Attendance Management System</p>
		<div class="hero-tag">Login</div>
	</section>

	<section class="card">
		<h2>{{ title or 'Login' }}</h2>

		<form method="POST" action="{{ url_for('auth.auth_login', role=role_key or 'hod') }}">

			<div class="form-group">
				<label>Username</label>
				<input type="text" name="username" required>
			</div>

			<div class="form-group">
				<label>Password</label>
				<input type="password" name="password" required>
			</div>

			{% if error %}
			<div class="error">{{ error }}</div>
			{% endif %}

			<button type="submit" class="btn">Login</button>
		</form>

		<div style="font-size:.85rem;color:var(--muted);margin-top:10px;text-align:center;">
			Role: {{ role_label or 'HOD' }}
		</div>

		<div class="back-link">
			<a href="{{ url_for('auth.login_page') }}">Back to Role Selection</a>
		</div>

	</section>

</div>


	<script>
function toggleTheme(){
    document.body.classList.toggle("light");
    localStorage.setItem("theme",
        document.body.classList.contains("light") ? "light":"dark"
    );
}

window.onload = function(){
    if(localStorage.getItem("theme")==="light"){
        document.body.classList.add("light");
		
    }
}
</script>
</body>

</html>
