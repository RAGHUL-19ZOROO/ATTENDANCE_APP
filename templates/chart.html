<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Attendance Chart</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;600;700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='images/logo.png') }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='images/logo.png') }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='images/logo.png') }}">
    <style>
        :root {
            --ink: #e6edf6;
            --muted: #9fb0c1;
            --surface: rgba(12, 18, 26, 0.75);
            --accent: #f0a64b;
            --accent-strong: #e57a4c;
            --teal: #2aa39b;
            --teal-strong: #17837d;
            --line: rgba(255, 255, 255, 0.08);
            --shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
        }
        * {
            box-sizing: border-box;
        }
        body {
            font-family: "Rubik", "Space Grotesk", sans-serif;
            color: var(--ink);
            margin: 0;
            min-height: 100vh;
            padding: 28px 18px 60px;
            background:
                radial-gradient(circle at 10% 20%, rgba(240, 166, 75, 0.16), transparent 55%),
                radial-gradient(circle at 90% 10%, rgba(42, 163, 155, 0.16), transparent 50%),
                linear-gradient(135deg, #05070b 0%, #0b1118 45%, #101a24 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 900px;
            background: var(--surface);
            padding: 30px;
            border-radius: 18px;
            box-shadow: var(--shadow);
            border: 1px solid var(--line);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
        }
        h1 {
            color: var(--ink);
            text-align: center;
            margin-top: 0;
        }
        .form-group {
            margin: 20px 0;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--muted);
        }
        select, button {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid var(--line);
            border-radius: 10px;
        }
        select {
            background: rgba(11, 17, 24, 0.9);
            color: var(--ink);
        }
        button {
            background: linear-gradient(135deg, var(--teal) 0%, var(--teal-strong) 100%);
            color: #ffffff;
            cursor: pointer;
            margin-top: 10px;
            font-weight: 600;
            border: none;
        }
        button:hover {
            opacity: 0.95;
        }
        #chartContainer {
            margin-top: 30px;
            text-align: center;
        }
        #chartImage {
            max-width: 100%;
            height: auto;
            border: 1px solid var(--line);
            border-radius: 10px;
        }
        .stats {
            margin-top: 20px;
            text-align: center;
        }
        .stats div {
            display: inline-block;
            margin: 0 15px;
            padding: 10px 20px;
            border-radius: 8px;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        @media (max-width: 768px) {
            .container {
                padding: 22px;
            }
            body {
                padding: 20px 14px 40px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Student Attendance Chart</h1>
        
        <div class="form-group">
            <label for="studentSelect">Select Student:</label>
            <select id="studentSelect">
                <option value="">-- Choose a Student --</option>
                {% for student in students %}
                <option value="{{ student.Id }}">{{ student.Id }} - {{ student.Name }}</option>
                {% endfor %}
            </select>
        </div>
        
        <button onclick="loadChart()">Generate Chart</button>
        
        <div id="chartContainer" style="display: none;">
            <h2 id="studentName"></h2>
            <img id="chartImage" src="" alt="Attendance Chart">
            <div class="stats" id="stats"></div>
        </div>
        
        <a href="{{ url_for('dashboard') }}" class="back-link">← Back to Dashboard</a>
    </div>

    <script>
        function loadChart() {
            const studentId = document.getElementById('studentSelect').value;
            
            if (!studentId) {
                alert('Please select a student');
                return;
            }
            
            fetch(`/attendance/chart/${studentId}`)
                .then(response => response.json())
                .then(data => {
                    if (data.ok) {
                        document.getElementById('studentName').textContent = data.student_name;
                        document.getElementById('chartImage').src = data.chart_url + '?t=' + new Date().getTime();
                        
                        const statsHtml = `
                            <div style="background-color: #4CAF50; color: white;">
                                Present: ${data.stats.present}
                            </div>
                            <div style="background-color: #F44336; color: white;">
                                Absent: ${data.stats.absent}
                            </div>
                            <div style="background-color: #FF9800; color: white;">
                                Late: ${data.stats.late}
                            </div>
                        `;
                        document.getElementById('stats').innerHTML = statsHtml;
                        document.getElementById('chartContainer').style.display = 'block';
                    } else {
                        alert(data.message);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('Failed to load chart');
                });
        }
    </script>
</body>
</html>
