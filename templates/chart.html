<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Attendance Chart</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:Poppins,sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e3a8a);
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:95%;
    max-width:900px;
    padding:30px;
    border-radius:18px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.18);
}

h1{text-align:center;margin-top:0;}

label{display:block;margin-bottom:6px;}

input,select{
    width:100%;
    padding:10px;
    border-radius:10px;
    border:1px solid rgba(255,255,255,0.2);
    background:rgba(255,255,255,0.1);
    color:#000000;
}

button{
    margin-top:15px;
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    background:#6366f1;
    color:#fff;
    font-weight:600;
}

#chartContainer{
    margin-top:20px;
    text-align:center;
}

#chartImage{
    max-width:100%;
    border-radius:12px;
    margin-top:10px;
}
</style>
</head>

<body>
<div class="container">

<h1>📊 Student Attendance Chart</h1>

<label>Select Student</label>
<select id="studentSelect">
<option value="">-- Choose a Student --</option>
{% for student in students %}
<option value="{{ student.Id }}">{{ student.Id }} - {{ student.Name }}</option>
{% endfor %}
</select>

<label style="margin-top:15px;">From Date</label>
<input type="date" id="fromDate">

<label style="margin-top:15px;">To Date</label>
<input type="date" id="toDate">

<button onclick="loadChart()">Generate Chart</button>

<div id="chartContainer" style="display:none;">
<h2 id="studentName"></h2>
<img id="chartImage" src="">
<div id="stats"></div>
</div>

<a href="{{ url_for('dashboard') }}" style="color:#c7d2fe;display:block;margin-top:20px;text-align:center;">← Back</a>

</div>




    <script>
        function loadChart() {
            const studentId = document.getElementById('studentSelect').value;
            const fromDate = document.getElementById('fromDate').value;
            const toDate = document.getElementById('toDate').value;

            if (!studentId) {
                alert('Please select a student');
                return;
            }

            if (!fromDate || !toDate) {
                alert('Please select both From Date and To Date');
                return;
            }

            if (fromDate > toDate) {
                alert('From Date cannot be greater than To Date');
                return;
            }

            const query = `from_date=${encodeURIComponent(fromDate)}&to_date=${encodeURIComponent(toDate)}`;

            fetch(`/attendance/chart/${studentId}?${query}`)
                .then(response => response.json())
                .then(data => {
                    if (data.ok) {
                        document.getElementById('studentName').textContent = `${data.student_name} (${data.from_date} to ${data.to_date})`;
                        document.getElementById('chartImage').src = data.chart_url + '?t=' + new Date().getTime();

                        const statsHtml = `
                            <div style="background-color: #4CAF50; color: white;">
                                Present: ${data.stats.present}
                            </div>
                            <div style="background-color: #F44336; color: white;">
                                Absent: ${data.stats.absent}
                            </div>
                            <div style="background-color: #FF9800; color: white;">
                                Late: ${data.stats.late}
                            </div>
                        `;
                        document.getElementById('stats').innerHTML = statsHtml;
                        document.getElementById('chartContainer').style.display = 'block';
                    } else {
                        alert(data.message);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('Failed to load chart');
                });
        }
    </script>
    <script>
function toggleTheme(){
    document.body.classList.toggle("light");
    localStorage.setItem("theme",
        document.body.classList.contains("light") ? "light":"dark"
    );
}

window.onload = function(){
    if(localStorage.getItem("theme")==="light"){
        document.body.classList.add("light");
    }
}
</script>
</body>

</html>
