<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Principal Settings</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;600;700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
	<style>
		:root {
			--ink: #e6edf6;
			--muted: #9fb0c1;
			--surface: rgba(12, 18, 26, 0.75);
			--line: rgba(255, 255, 255, 0.08);
			--shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
			--accent: #f0a64b;
			--teal: #2aa39b;
			--danger: #dc3545;
		}
		* { box-sizing: border-box; }
		body {
			font-family: "Rubik", "Space Grotesk", sans-serif;
			color: var(--ink);
			margin: 0;
			min-height: 100vh;
			background:
				radial-gradient(circle at 10% 20%, rgba(240, 166, 75, 0.16), transparent 55%),
				radial-gradient(circle at 90% 10%, rgba(42, 163, 155, 0.16), transparent 50%),
				linear-gradient(135deg, #05070b 0%, #0b1118 45%, #101a24 100%);
			padding: 28px 18px 60px;
		}
		.shell { max-width: 860px; margin: 0 auto; display: grid; gap: 20px; }
		.card {
			background: var(--surface);
			border: 1px solid var(--line);
			border-radius: 20px;
			padding: 20px;
			box-shadow: var(--shadow);
			backdrop-filter: blur(18px);
			-webkit-backdrop-filter: blur(18px);
		}
		.hero { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
		.hero h1 { margin: 0; font-size: 1.3rem; }
		.hero p { margin: 6px 0 0; color: var(--muted); }
		.actions { display: flex; gap: 8px; flex-wrap: wrap; }
		.btn {
			padding: 10px 14px;
			border-radius: 10px;
			text-decoration: none;
			font-weight: 600;
			color: #fff;
			border: none;
			cursor: pointer;
		}
		.btn-save { background: linear-gradient(135deg, var(--teal) 0%, #17837d 100%); }
		.btn-logout { background: var(--danger); }
		label {
			display: flex;
			flex-direction: column;
			gap: 8px;
			color: var(--muted);
			font-size: 0.92rem;
			font-weight: 600;
		}
		.controls {
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
			gap: 12px;
			align-items: end;
		}
		input[type="date"] {
			padding: 10px 12px;
			border: 1px solid var(--line);
			border-radius: 10px;
			background: rgba(11, 17, 24, 0.9);
			color: var(--ink);
		}
		.message {
			padding: 10px 12px;
			border-radius: 10px;
			font-size: 0.9rem;
		}
		.message-ok { background: rgba(42, 163, 155, 0.2); color: #7ff4ea; }
		.message-error { background: rgba(220, 53, 69, 0.2); color: #ffc1c7; }
		.note { color: var(--muted); font-size: 0.88rem; margin-top: 8px; }
	</style>
</head>
<body>
	<div class="shell">
		<section class="card hero">
			<div>
				<h1>Principal Settings</h1>
				<p>Set semester boundaries used in attendance percentage and result calculations.</p>
			</div>
			<div class="actions">
				<a class="btn btn-logout" href="{{ url_for('logout') }}">Logout</a>
			</div>
		</section>

		<section class="card">
			{% if message %}
			<div class="message message-ok">{{ message }}</div>
			{% endif %}
			{% if error %}
			<div class="message message-error">{{ error }}</div>
			{% endif %}

			<form method="POST" action="{{ url_for('principal_settings_page') }}">
				<div class="controls">
					<label>
						Semester Start Date
						<input type="date" name="semester_start" value="{{ settings.semester_start }}" required>
					</label>
					<label>
						Semester End Date
						<input type="date" name="semester_end" value="{{ settings.semester_end }}" required>
					</label>
					<div class="actions">
						<button class="btn btn-save" type="submit">Save Semester Dates</button>
					</div>
				</div>
			</form>
			<div class="note">Class Rep controls Saturday leave preference from Attendance dashboard.</div>
		</section>
	</div>
</body>
</html>
