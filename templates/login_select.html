<!DOCTYPE html>
<html>

<head>
	<title>Select Login</title>
	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
	<style>
		body {
			margin: 0;
			font-family: Poppins, sans-serif;
			background: linear-gradient(135deg, #0f172a, #1e3a8a);
			display: flex;
			justify-content: center;
			align-items: center;
			min-height: 100vh;
			color: #fff;
		}

		.card {
			padding: 40px;
			background: rgba(255, 255, 255, 0.08);
			backdrop-filter: blur(18px);
			border-radius: 18px;
			border: 1px solid rgba(255, 255, 255, 0.18);
			text-align: center;
		}

		a {
			display: block;
			margin: 12px 0;
			padding: 12px;
			background: #6366f1;
			color: #fff;
			text-decoration: none;
			border-radius: 12px;
			font-weight: 600;
		}
	</style>
</head>

<body>
	<div class="card">
		<h2>Select Login Role</h2>
		<a href="{{ url_for('auth.login_hod_page') }}">Login as HOD</a>
		<a href="{{ url_for('auth.login_classrep_page') }}">Login as Class Rep</a>
		<a href="{{ url_for('auth.login_principal_page') }}">Login as Principal</a>
	</div>

	<script>
		function toggleTheme() {
			document.body.classList.toggle("light");
			localStorage.setItem("theme",
				document.body.classList.contains("light") ? "light" : "dark"
			);
		}

		window.onload = function () {
			if (localStorage.getItem("theme") === "light") {
				document.body.classList.add("light");
			}
		}
	</script>
</body>

</html>
